idea:
  title: Coordination Enhancing Video Game
  domain: artificial_intelligence
  hypothesis: 'There exists a video game such that if two people, who have never met,
    have both played it, they can on average coordinate in another unrelated environment
    twice as well; AI can be used to design such a game.

    '
